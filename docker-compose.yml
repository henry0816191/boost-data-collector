# Boost Data Collector - Docker Compose
# Runs: PostgreSQL, Redis, Django (gunicorn), Celery worker, Celery beat

services:
  # db:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: ${POSTGRES_USER:-boost}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-boost}
  #     POSTGRES_DB: ${POSTGRES_DB:-boost_dashboard}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test:
  #       [
  #         "CMD-SHELL",
  #         "pg_isready -U ${POSTGRES_USER:-boost} -d ${POSTGRES_DB:-boost_dashboard}",
  #       ]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  selenium:
    image: selenium/standalone-chrome:145.0-chromedriver-145.0-20260222
    platform: linux/amd64
    shm_size: "2g"
    ports:
      - "4444:4444"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -sf http://localhost:4444/status | grep -qE ''"ready"[[:space:]]*:[[:space:]]*true'' || exit 1',
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 60s

  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-boost}:${POSTGRES_PASSWORD:-boost}@db:5432/${POSTGRES_DB:-boost_dashboard}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      ALLOWED_HOSTS: localhost,127.0.0.1,web,0.0.0.0
      SELENIUM_HUB_URL: http://selenium:4444/wd/hub
    volumes:
      - workspace_data:/app/workspace
      - logs_data:/app/logs
    depends_on:
      # db: { condition: service_healthy }
      redis: { condition: service_healthy }

  celery_worker:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-boost}:${POSTGRES_PASSWORD:-boost}@db:5432/${POSTGRES_DB:-boost_dashboard}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SELENIUM_HUB_URL: http://selenium:4444/wd/hub
    volumes:
      - workspace_data:/app/workspace
      - logs_data:/app/logs
    command: celery -A config worker -l info
    depends_on:
      # db: { condition: service_healthy }
      redis: { condition: service_healthy }

  celery_beat:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-boost}:${POSTGRES_PASSWORD:-boost}@db:5432/${POSTGRES_DB:-boost_dashboard}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - workspace_data:/app/workspace
      - logs_data:/app/logs
      - celerybeat_data:/app/celerybeat
    command: celery -A config beat -l info
    depends_on:
      # db: { condition: service_healthy }
      redis: { condition: service_healthy }
      celery_worker: { condition: service_started }

volumes:
  postgres_data:
  workspace_data:
  logs_data:
  celerybeat_data:
