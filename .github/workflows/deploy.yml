name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Determine script source
        id: script-source
        run: |
          use_custom="${{ secrets.DEPLOY_SCRIPT_REPO != '' && 'true' || 'false' }}"
          echo "use_custom=${use_custom}" >> $GITHUB_OUTPUT

      # ── Default: script from this repo ─────────────────────────────────────
      - name: Checkout this repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Copy default deploy script to server
        if: steps.script-source.outputs.use_custom != 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: ".github/workflows/deploy-script/deploy.sh"
          target: "/tmp"

      # ── Optional: script from your private repo ────────────────────────────
      # Set secrets: DEPLOY_SCRIPT_REPO (e.g. my-org/my-private-repo),
      #              DEPLOY_SCRIPT_FILE (e.g. deploy.sh, default),
      #              DEPLOY_SCRIPT_TOKEN (PAT with read access to that repo).
      - name: Checkout private repo
        if: steps.script-source.outputs.use_custom == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.DEPLOY_SCRIPT_REPO }}
          token: ${{ secrets.DEPLOY_SCRIPT_TOKEN }}
          path: deploy-script-private
          ref: ${{ secrets.DEPLOY_SCRIPT_REF || 'main' }}

      - name: Copy custom deploy script to server
        if: steps.script-source.outputs.use_custom == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "deploy-script-private/${{ secrets.DEPLOY_SCRIPT_FILE || 'deploy.sh' }}"
          target: "/tmp"

      # ── Run deploy on server ──────────────────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            export REPO_URL="https://github.com/${{ github.repository }}.git" BRANCH="main"
            bash /tmp/deploy.sh
