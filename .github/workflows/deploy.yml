name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main, develop]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ github.event.workflow_run.head_branch == 'main' && 'production' || 'staging' }}
    env:
      BRANCH: ${{ github.event.workflow_run.head_branch }}
      REPO_URL: https://github.com/${{ github.repository }}.git
      SCRIPT_URL: ${{ secrets.DEPLOY_SCRIPT_URL || format('https://raw.githubusercontent.com/{0}/{1}/.github/workflows/deploy-script/deploy.sh', github.repository, github.event.workflow_run.head_sha) }}
    steps:
      - name: Set SSH vars (production)
        if: github.event.workflow_run.head_branch == 'main'
        run: |
          echo "SSH_HOST=${{ secrets.PROD_SSH_HOST }}" >> $GITHUB_ENV
          echo "SSH_USER=${{ secrets.PROD_SSH_USER }}" >> $GITHUB_ENV
          echo "SSH_PRIVATE_KEY=${{ secrets.PROD_SSH_PRIVATE_KEY }}" >> $GITHUB_ENV
          echo "SSH_PORT=${{ secrets.PROD_SSH_PORT || 22 }}" >> $GITHUB_ENV

      - name: Set SSH vars (staging)
        if: github.event.workflow_run.head_branch == 'develop'
        run: |
          echo "SSH_HOST=${{ secrets.DEV_SSH_HOST }}" >> $GITHUB_ENV
          echo "SSH_USER=${{ secrets.DEV_SSH_USER }}" >> $GITHUB_ENV
          echo "SSH_PRIVATE_KEY=${{ secrets.DEV_SSH_PRIVATE_KEY }}" >> $GITHUB_ENV
          echo "SSH_PORT=${{ secrets.DEV_SSH_PORT || 22 }}" >> $GITHUB_ENV

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          DEPLOY_SCRIPT_TOKEN: ${{ secrets.DEPLOY_SCRIPT_TOKEN }}
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          port: ${{ env.SSH_PORT }}
          envs: SCRIPT_URL,DEPLOY_SCRIPT_TOKEN,BRANCH,REPO_URL
          script: |
            if [ -n "$DEPLOY_SCRIPT_TOKEN" ]; then
              curl -sSL -f -H "Authorization: token $DEPLOY_SCRIPT_TOKEN" "$SCRIPT_URL" -o /tmp/deploy.sh
            else
              curl -sSL -f "$SCRIPT_URL" -o /tmp/deploy.sh
            fi
            bash /tmp/deploy.sh
            rm -f /tmp/deploy.sh
