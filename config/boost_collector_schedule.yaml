# Boost collector schedule (see docs/Workflow.md)
# default_time is in America/Los_Angeles (CELERY_TIMEZONE). Use 24h "HH:MM".
# If needed, convert to UTC based on DST (PST/PDT) for operational checks.

groups:
  github:
    default_time: "16:10"
    tasks:
      - command: run_boost_usage_tracker
        schedule: daily
        args: ["--task", "monitor_content"]
      - command: run_update_created_repos_by_language
        schedule: daily
      - command: run_boost_library_tracker
        schedule: daily
      - command: run_boost_library_usage_dashboard
        schedule: daily

  slack:
    default_time: "16:30"
    tasks:
      - command: run_cppa_slack_tracker
        schedule: daily

  mailing_list:
    default_time: "00:10"
    tasks:
      - command: run_boost_mailing_list_tracker
        schedule: daily
