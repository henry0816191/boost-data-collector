# Boost collector schedule (see docs/Workflow.md)
# Each group must have default_time: 24h "HH:MM" in project timezone (America/Los_Angeles)

groups:
  github:
    default_time: "09:10"
    tasks:
      - command: run_boost_library_tracker
        schedule: monthly
        on: 1
      - command: run_boost_usage_tracker
        schedule: daily

  # slack:
